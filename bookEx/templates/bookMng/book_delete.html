{% extends "base.html" %}
{% load static %}

{% block sidenav %}
{% for item in item_list %}
<a href="{{ item.link }}" class="nav-link"><i class="bi bi-chevron-right"></i> {{ item.item }}</a>
{% endfor %}
{% endblock sidenav %}

{% block content %}
<div class="page-header"><i class="bi bi-trash-fill"></i> Delete Book</div>
<div class="bx-card p-4 text-center" style="max-width:480px;margin:0 auto;">
    <i class="bi bi-check-circle-fill" style="font-size:3rem;color:#c0000c;"></i>
    <h4 class="mt-3">Book Deleted Successfully!</h4>
    <a href="{% url 'mybooks' %}" class="btn-bx-primary text-decoration-none mt-3 d-inline-flex">
        <i class="bi bi-arrow-left"></i> Back to My Books
    </a>
</div>
{% endblock content %}
